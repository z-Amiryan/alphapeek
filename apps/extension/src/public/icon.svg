<svg width="128" height="128" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
  <!-- AlphaPeek brand mark: the offset "data card" motif (an outlined card
       peeking out behind a solid lime front-card) with an ink stepped-sparkline
       inside — the wallet/token card you peek, trending up. The lime card reads
       against the ink field; the ink sparkline reads against the card. Keep in
       sync with components/icons.tsx (LogoMark) and the full-size (48/128) render
       in scripts/make-icons.mjs. The 16px PNG is an intentionally simplified
       variant (see make-icons.mjs) and is NOT byte-identical. -->
  <rect width="40" height="40" fill="#0d0d0d" />
  <rect x="13" y="13" width="20" height="20" fill="#0d0d0d" stroke="#c6f432" stroke-width="2.2" />
  <rect x="7" y="7" width="20" height="20" fill="#c6f432" />
  <path d="M10.5 21 H14 V16.5 H17.5 V18.5 H21 V12.5" fill="none" stroke="#0d0d0d" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter" />
</svg>
