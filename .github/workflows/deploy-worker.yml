name: Deploy Worker

# Manual trigger only — optional gated alternative to the primary manual
# `wrangler deploy`. Why not auto-deploy on merge: DEPLOYMENT.md §8.
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Routes the prod deploy through the `production` GitHub Environment so it
    # pauses for required-reviewer approval — keeps "ask before deploying to
    # Cloudflare production" (CLAUDE.md / DEPLOYMENT.md §2) true.
    environment: production
    # Never run two prod deploys at once; let an in-flight one finish.
    concurrency:
      group: deploy-worker
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      # Version comes from the root package.json "packageManager" field; passing
      # `version` as well makes pnpm/action-setup@v4 error on the conflict.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # COINSTATS_API_KEY is set via `wrangler secret put`, NOT here.
      - run: pnpm --filter @alphapeek/worker run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          # Uncomment only if your API token spans multiple Cloudflare accounts
          # (a single-account-scoped token lets wrangler infer the account):
          # CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
