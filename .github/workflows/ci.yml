name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Version comes from the root package.json "packageManager" field; passing
      # `version` as well makes pnpm/action-setup@v4 error on the conflict.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - name: Upload extension build
        uses: actions/upload-artifact@v4
        with:
          name: alphapeek-extension
          path: apps/extension/.output/chrome-mv3/
          if-no-files-found: error
